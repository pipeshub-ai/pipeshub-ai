replicaCount: 3  # High Availability: 3 replicas for fault tolerance

# If the startup fails due to permissions of "/app/process_monitor.log", build the image with LOG_FILE="/data/pipeshub/process_monitor.log"
image:
  repository: pipeshubai/pipeshub-ai
  pullPolicy: IfNotPresent
  tag: "latest"  # v0.3.0 is not available on Docker Hub

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP

ingress:
  enabled: false
  className: "" # Fill
  annotations: [] # Fill
  hosts: [] # Fill
    # - host: pipeshub.example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
    #       port: 3001
    #       serviceName: pipeshub-ai
    # - host: pipeshub-connector.example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
    #       port: 8088
    #       serviceName: pipeshub-ai
  tls: [] # Fill
    # - secretName: pipeshub-example-com-tls
    #   hosts:
    #     - pipeshub.example.com
    # - secretName: pipeshub-connector-example-com-tls
    #   hosts:
    #     - pipeshub-connector.example.com
resources:
  limits:
    cpu: 8
    memory: 8Gi
  requests:
    cpu: 4
    memory: 4Gi
  # For small clusters (e.g. kind), use lower requests so the pod can schedule: --set resources.requests.cpu=500m --set resources.requests.memory=1Gi

volumes: {}

volumeMounts: {}

nodeSelector: {}

tolerations: []

affinity: {}

autoscaling:
  enabled: true
  minReplicas: 3  # Minimum 3 for High Availability
  maxReplicas: 10  # Scale up to 10 pods based on load
  targetCPUUtilizationPercentage: 70  # Scale when CPU > 70%
  targetMemoryUtilizationPercentage: 80  # Scale when Memory > 80%
  # ⚠️  CRITICAL: Metrics Server is REQUIRED for autoscaling!
  #     Without it, HPA will NOT work. Install it first:
  #     ./deployment/helm/install-metrics-server.sh
  #
  #     Verify: kubectl get deployment metrics-server -n kube-system
  #
  # behavior:  # Optional: Control scale-up/down speed
  #   scaleDown:
  #     stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
  #     policies:
  #       - type: Percent
  #         value: 50  # Scale down max 50% of current pods
  #         periodSeconds: 60
  #   scaleUp:
  #     stabilizationWindowSeconds: 0  # Scale up immediately
  #     policies:
  #       - type: Percent
  #         value: 100  # Scale up max 100% of current pods
  #         periodSeconds: 60
  #       - type: Pods
  #         value: 2  # Or add max 2 pods at a time
  #         periodSeconds: 60

persistence:
  enabled: true
  storageClass: "" # Fill
  accessModes:
    - ReadWriteOnce
  size: 10Gi

config:
  nodeEnv: "production"
  logLevel: "debug"
  allowedOrigins: ""  # SECURITY: Set to specific origins (comma-separated) instead of "*"
  # Example: "https://app.example.com,https://admin.example.com"
  # For development: --set config.allowedOrigins="http://localhost:3001"
  connectorPublicBackend: "" # Fill
  # connectorPublicBackend: "https://pipeshub-connector.example.com"
  frontendPublicUrl: "" # Fill
  # frontendPublicUrl: "https://pipeshub.dyn.example.com"

secretKey: "" # Fill

mongodb:
  replicaCount: 3  # MongoDB Replica Set: 3 nodes for quorum (2 out of 3)
  replicaSetAvailable: false  # Set true only when MongoDB is configured as a replica set
  tls:
    enabled: false
    securityContext:
      enabled: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
  auth:
    enabled: true
    # rootPassword: ""  # Set via --set mongodb.auth.rootPassword=<password> or use external secret
    # username: pipeshub
    # password: ""  # Set via --set mongodb.auth.password=<password> or use external secret
    # database: pipeshub
  persistence:
    enabled: true
    storageClass: "" # Fill
  arbiter:
    enabled: true  # Enable arbiter for MongoDB replica set quorum
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

redis:
  architecture: replication  # Redis HA: master-replica architecture
  master:
    count: 1  # 1 master
  replica:
    replicaCount: 2  # 2 read replicas for HA
  sentinel:
    enabled: true  # Enable Redis Sentinel for automatic failover
    quorum: 2  # Quorum: 2 out of 3 sentinels must agree
  auth:
    enabled: true
    # password: ""  # Set via --set redis.auth.password=<password> or use external secret
  persistence:
    enabled: true
    storageClass: "" # Fill

arango:
  enabled: false
  image:
    repository: arangodb
    tag: 3.12.4
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: "" # Fill
  auth:
    enabled: true
    rootPassword: "root"
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

etcd:
  enabled: false
  image:
    repository: quay.io/coreos/etcd
    tag: v3.5.17
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

zookeeper:
  replicaCount: 3  # Zookeeper ensemble: 3 nodes for quorum (2 out of 3)
  image:
    repository: confluentinc/cp-zookeeper
    tag: 7.9.0
    pullPolicy: IfNotPresent
  config:
    tickTime: "2000"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  podSecurityContext:
    runAsUser: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

kafka:
  replicaCount: 3  # Kafka cluster: 3 brokers for HA and fault tolerance
  image:
    repository: confluentinc/cp-kafka
    tag: 7.9.0
    pullPolicy: IfNotPresent
  config:
    brokerId: "1"
    offsetsTopicReplicationFactor: "3"  # Replicate data across 3 brokers
    transactionStateLogMinIsr: "2"  # Minimum in-sync replicas: 2 out of 3
    transactionStateLogReplicationFactor: "3"  # Transaction log replicated to 3 brokers
    groupInitialRebalanceDelayMs: "0"
    logRetentionHours: "24"
    numNetworkThreads: "3"
    numIoThreads: "8"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  podSecurityContext:
    runAsUser: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL

qdrant:
  replicaCount: 3  # Qdrant cluster: 3 nodes for distributed vector search
  image:
    repository: qdrant/qdrant
    tag: v1.15
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  apiKey: "api_key"

# Neo4j (enabled by default). When enabled, the app uses Neo4j as the graph database (DATA_STORE=neo4j).
# Override neo4j.auth.password in production (e.g. --set neo4j.auth.password=... or values from secret manager).
neo4j:
  enabled: true
  replicaCount: 3  # Neo4j cluster: 3 core servers for HA (causal clustering)
  image:
    repository: neo4j
    tag: "5.26.0"
    pullPolicy: IfNotPresent
  auth:
    username: "neo4j"
    password: "your_password"
    database: "neo4j"
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: "" # Fill
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  # Optional: apoc plugin and memory tuning. Values below fit small clusters (e.g. kind with 2Gi limit).
  # Increase for production (e.g. heap 2G, pagecache 512m when node has 4Gi+).
  env:
    NEO4J_PLUGINS: '["apoc"]'
    NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    NEO4J_dbms_memory_heap_initial__size: 256m
    NEO4J_dbms_memory_heap_max__size: 512m
    NEO4J_dbms_memory_pagecache_size: 256m
