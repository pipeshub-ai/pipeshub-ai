services:
  pipeshub-ai:
    image: pipeshubai/pipeshub-ai:${IMAGE_TAG:-latest}
    #    build:
      #      context: ../..
        #      dockerfile: Dockerfile
        #    image: pipeshubai/pipeshub-ai:localbuild
    container_name: pipeshub-ai
    restart: always
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 64G
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    shm_size: 4gb
    init: true
    logging:
      driver: local
      options:
        max-size: "${LOG_MAX_SIZE:-20m}"
        max-file: "${LOG_MAX_FILE:-15}"
        compress: "true"
    environment:
      # Core environment settings
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - STRICT_MODE=${STRICT_MODE:-false}
      - SKIP_DOMAIN_CHECK=${SKIP_DOMAIN_CHECK:-false}

      # Security settings - allow override with custom secret
      - SECRET_KEY=${SECRET_KEY:-your_random_encryption_secret_key}

      # Public endpoints
      - CONNECTOR_PUBLIC_BACKEND=${CONNECTOR_PUBLIC_BACKEND:-}
      - FRONTEND_PUBLIC_URL=${FRONTEND_PUBLIC_URL:-}

      # Internal service URLs
      - QUERY_BACKEND=http://localhost:8000
      - CONNECTOR_BACKEND=http://localhost:8088
      - INDEXING_BACKEND=http://localhost:8091

      # Key-Value Store Configuration
      - KV_STORE_TYPE=${KV_STORE_TYPE:-etcd}

      # ETCD config
      - ETCD_URL=http://etcd:2379
      - ETCD_HOST=etcd
      - ETCD_TIMEOUT=${ETCD_TIMEOUT:-5000}

      # ArangoDB config
      - ARANGO_URL=http://arango:8529
      - ARANGO_DB_NAME=es
      - ARANGO_USERNAME=root
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:-your_password}
      # Ensure we use the same password as configured for the ArangoDB service

      # Message broker config
      - MESSAGE_BROKER=${MESSAGE_BROKER:-redis}
      - REDIS_STREAMS_MAXLEN=${REDIS_STREAMS_MAXLEN:-10000}

      # Kafka config
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka-1:9092}
      - KAFKA_SSL=${KAFKA_SSL:-false}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-}

      # Redis config
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - REDIS_KV_PREFIX=${REDIS_KV_PREFIX:-pipeshub:kv:}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-10000}
      - REDIS_DB=${REDIS_DB:-0}

      # MongoDB config
      - MONGO_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=es

      # Qdrant config
      - QDRANT_API_KEY=${QDRANT_API_KEY:-your_qdrant_secret_api_key}
      - QDRANT_HOST=qdrant
      - QDRANT_GRPC_PORT=6334
      - QDRANT_PORT=6333

      - OLLAMA_API_URL=http://host.docker.internal:11434

      # AWS credentials (for Bedrock IAM role access from inside the container)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}

      # Rate limit config
      - MAX_REQUESTS_PER_MINUTE=${MAX_REQUESTS_PER_MINUTE:-500}
      - MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE=${MAX_OAUTH_CLIENT_REQUESTS_PER_MINUTE:-1000}

      # MCP OAuth scopes
      - MCP_SCOPES=${MCP_SCOPES:-openid,profile,email,offline_access,connector:read,connector:write,semantic:read,semantic:write,conversation:read,conversation:write,conversation:chat,kb:read,team:read}

      # Token config
      - ACCESS_TOKEN_EXPIRY=${ACCESS_TOKEN_EXPIRY:-24h}
      - REFRESH_TOKEN_EXPIRY=${REFRESH_TOKEN_EXPIRY:-720h}

      # Indexing service config
      - MAX_CONCURRENT_PARSING=${MAX_CONCURRENT_PARSING:-5}
      - MAX_CONCURRENT_INDEXING=${MAX_CONCURRENT_INDEXING:-7}
      - MAX_PENDING_INDEXING_TASKS=${MAX_PENDING_INDEXING_TASKS:-40}
      - INDEXING_UVICORN_WORKERS=${INDEXING_UVICORN_WORKERS:-1}
      - DOCLING_UVICORN_WORKERS=${DOCLING_UVICORN_WORKERS:-1}
      - LOCAL_DOCLING_PARSE_WORKERS=${LOCAL_DOCLING_PARSE_WORKERS:-1}
      - PDF_OCR_DETECTION_WORKERS=${PDF_OCR_DETECTION_WORKERS:-1}
      - MAX_TABLE_ROWS_FOR_LLM=${MAX_TABLE_ROWS_FOR_LLM:-1000}
      - EXCEL_MAX_TABLE_ROWS_TO_INDEX=${EXCEL_MAX_TABLE_ROWS_TO_INDEX:-20000}
      - EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT=${EXCEL_HEADER_GENERATION_SAMPLE_SCAN_LIMIT:-500}

      - OPIK_API_KEY=${OPIK_API_KEY:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-}

      # Slack Bot config
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
      - SLACK_BOT_PORT=${SLACK_BOT_PORT:-3020}

      - ENABLE_PYMUPDF_PROCESSOR=${ENABLE_PYMUPDF_PROCESSOR:-false}

      # Sandbox execution mode (local = subprocess, docker = ephemeral containers).
      # Defaults to "docker" -- the sandbox-image service below builds the required
      # pipeshub/sandbox:latest image before pipeshub-ai starts.
      # Production (docker-compose.prod.yml) pulls pipeshubai/pipeshub-sandbox:${IMAGE_TAG}
      # from the registry instead; build/push from deployment/sandbox alongside pipeshub-ai.
      - SANDBOX_MODE=${SANDBOX_MODE:-docker}
    depends_on:
      qdrant:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      etcd:
        condition: service_healthy
      arango:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully
    volumes:
      - pipeshub_data:/data/pipeshub
      - pipeshub_root_local:/root/.local
      - /var/run/docker.sock:/var/run/docker.sock  # Required for SANDBOX_MODE=docker

    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Probe the aggregated /api/v1/health/services endpoint served by the
    # nodejs API. If curl succeeds, the nodejs service itself is up; the JSON
    # body must additionally report every Python application service
    # (query, connector, indexing, docling) as "healthy" before the container
    # is considered ready. This makes `docker compose up --wait` block until
    # all 5 pipeshub services inside the container have finished starting.
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -sf http://localhost:3000/api/v1/health/services -o /tmp/hc.json &&
          python3 -c "import json,sys; d=json.load(open('/tmp/hc.json')); s=d.get('services',{}) or {}; required=('query','connector','indexing','docling'); sys.exit(0 if all(s.get(k)=='healthy' for k in required) else 1)"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  mongodb:
    image: mongo:8.0.17
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:bookworm
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c "redis-server
      --appendonly yes
      --appendfsync everysec
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  arango:
    image: arangodb:3.12.4
    container_name: arango
    restart: always
    ports:
      - "8529:8529"

    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_PASSWORD:-your_password}
      - ARANGO_OVERRIDE_DETECTED_TOTAL_MEMORY=32G
      - ARANGO_LOG_LEVEL=warning

    command: >
      arangod
      --server.threads 8
      --rocksdb.block-cache-size 8G
      --rocksdb.total-write-buffer-size 4G
      --rocksdb.max-background-jobs 8
      --rocksdb.block-cache-shard-bits 4
      --server.statistics false

    deploy:
      resources:
        limits:
          memory: 32g
          cpus: '12'

    volumes:
      - arango_data:/var/lib/arangodb3

    healthcheck:
      test: ["CMD-SHELL", "arangosh --server.endpoint tcp://localhost:8529 --server.password '${ARANGO_PASSWORD:-your_password}' --javascript.execute-string 'db._version()' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    restart: always
    ports:
      - "2379:2379"
      - "2380:2380"
    command: >
      etcd
      --name etcd-node
      --data-dir /etcd-data
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://etcd:2379
      --listen-peer-urls http://0.0.0.0:2380
      --initial-advertise-peer-urls http://etcd:2380
      --initial-cluster etcd-node=http://etcd:2380
    volumes:
      - etcd_data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka-1
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181

      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=ACCESS:PLAINTEXT
      - KAFKA_LISTENERS=ACCESS://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=ACCESS://kafka-1:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=ACCESS

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1

      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0

      # Mehr Partitionen
      - KAFKA_CREATE_TOPICS=record-events:6:1,entity-events:6:1,sync-events:6:1

      # Threads
      - KAFKA_NUM_NETWORK_THREADS=8
      - KAFKA_NUM_IO_THREADS=16

      # Socket Buffers
      - KAFKA_SOCKET_SEND_BUFFER_BYTES=1024000
      - KAFKA_SOCKET_RECEIVE_BUFFER_BYTES=1024000
      - KAFKA_SOCKET_REQUEST_MAX_BYTES=104857600

      # Log Settings
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Build-only helper that ensures the pipeshub/sandbox:latest image is
  # available on the host Docker daemon before pipeshub-ai starts.
  # The container itself is a no-op: it prints a message and exits 0, leaving
  # the image in place for SANDBOX_MODE=docker ephemeral execution.
  sandbox-image:
    image: pipeshub/sandbox:latest
    container_name: sandbox-image
    build:
      context: ../../deployment/sandbox
      dockerfile: Dockerfile
    restart: "no"
    command: ["sh", "-c", "echo 'pipeshub/sandbox:latest image ready'"]

  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-your_qdrant_secret_api_key}
      # Performance optimizations
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=64
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0  # Use all available CPUs
      - QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=8
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD=50000
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=256
      - QDRANT__CLUSTER__CONSENSUS__MAX_MESSAGE_QUEUE_SIZE=1000
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 48G
        reservations:
          cpus: '4'
          memory: 8G
    ulimits:
      nofile:
        soft: 50000
        hard: 50000
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  arango_data:
    driver: local
  etcd_data:
    driver: local
  qdrant_storage:
    driver: local
  pipeshub_data:
    driver: local
  pipeshub_root_local:
    driver: local