# Standalone Redis Cluster topology for local development and integration
# testing. Brings up 6 nodes (3 masters + 3 replicas) on ports 7000-7005 plus
# a one-shot `cluster-init` service that wires them together.
#
# Usage:
#   docker compose -f docker-compose.cluster.yml up -d
#   # wait until the cluster-init container exits with status 0
#   docker compose -f docker-compose.cluster.yml ps
#
# Point the app at it:
#   export REDIS_MODE=cluster
#   export REDIS_NODES="127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003,127.0.0.1:7004,127.0.0.1:7005"
#
# Tear down:
#   docker compose -f docker-compose.cluster.yml down -v
#
# Notes / portability:
#   - This file uses `network_mode: host` so the cluster's gossip protocol
#     (CLUSTER MEET / bus port) works without IP translation. Every node and
#     every client agrees that `127.0.0.1` is the same address.
#   - `network_mode: host` is Linux-only. On macOS / Windows / Docker Desktop
#     it does NOT bridge to the host the same way; you would need a different
#     networking strategy (e.g. all 6 instances inside a single container, or
#     use `cluster-announce-ip <gateway-IP>` paired with `extra_hosts`).
#     For now this file targets Linux developers and CI runners.

x-redis-node: &redis-node
  image: redis:7.4-bookworm
  restart: unless-stopped
  network_mode: host

services:
  redis-cluster-0:
    <<: *redis-node
    container_name: redis-cluster-0
    command:
      - redis-server
      - --port
      - "7000"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7000.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7000"
      - --cluster-announce-bus-port
      - "17000"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7000 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-0:/data

  redis-cluster-1:
    <<: *redis-node
    container_name: redis-cluster-1
    command:
      - redis-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7001.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7001"
      - --cluster-announce-bus-port
      - "17001"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7001 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-1:/data

  redis-cluster-2:
    <<: *redis-node
    container_name: redis-cluster-2
    command:
      - redis-server
      - --port
      - "7002"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7002.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7002"
      - --cluster-announce-bus-port
      - "17002"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7002 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-2:/data

  redis-cluster-3:
    <<: *redis-node
    container_name: redis-cluster-3
    command:
      - redis-server
      - --port
      - "7003"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7003.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7003"
      - --cluster-announce-bus-port
      - "17003"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7003 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-3:/data

  redis-cluster-4:
    <<: *redis-node
    container_name: redis-cluster-4
    command:
      - redis-server
      - --port
      - "7004"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7004.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7004"
      - --cluster-announce-bus-port
      - "17004"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7004 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-4:/data

  redis-cluster-5:
    <<: *redis-node
    container_name: redis-cluster-5
    command:
      - redis-server
      - --port
      - "7005"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes-7005.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7005"
      - --cluster-announce-bus-port
      - "17005"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 7005 ping | grep -q PONG"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redis-cluster-5:/data

  cluster-init:
    image: redis:7.4-bookworm
    container_name: redis-cluster-init
    network_mode: host
    depends_on:
      redis-cluster-0:
        condition: service_healthy
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
      redis-cluster-4:
        condition: service_healthy
      redis-cluster-5:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Bootstrapping Redis Cluster (3 masters + 3 replicas)..."
        redis-cli --cluster create \
          127.0.0.1:7000 \
          127.0.0.1:7001 \
          127.0.0.1:7002 \
          127.0.0.1:7003 \
          127.0.0.1:7004 \
          127.0.0.1:7005 \
          --cluster-replicas 1 \
          --cluster-yes
        echo "Cluster create returned OK. Verifying cluster_state..."
        redis-cli -h 127.0.0.1 -p 7000 cluster info | tee /tmp/info
        grep -q "^cluster_state:ok" /tmp/info
        echo "OK"

volumes:
  redis-cluster-0:
  redis-cluster-1:
  redis-cluster-2:
  redis-cluster-3:
  redis-cluster-4:
  redis-cluster-5:
