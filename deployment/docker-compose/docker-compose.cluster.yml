# Standalone Redis Cluster topology for local development and integration
# testing. Brings up 6 nodes (3 masters + 3 replicas) on ports 7000-7005 plus
# a one-shot `cluster-init` service that wires them together.
#
# Usage:
#   docker compose -f docker-compose.cluster.yml up -d
#   # wait until the cluster-init container exits with status 0
#   docker compose -f docker-compose.cluster.yml ps
#
# Point the app at it:
#   export REDIS_MODE=cluster
#   export REDIS_NODES="127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002,127.0.0.1:7003,127.0.0.1:7004,127.0.0.1:7005"
#
# Tear down:
#   docker compose -f docker-compose.cluster.yml down -v
#
# Notes:
#   - Each node uses --cluster-announce-ip 127.0.0.1 so clients connecting
#     from the host machine can follow MOVED redirects without DNS games.
#   - For an in-cluster integration test (test container on the same docker
#     network), override --cluster-announce-ip with the docker service name
#     and point REDIS_NODES at redis-cluster-0:7000,...,redis-cluster-5:7005.

x-redis-node: &redis-node
  image: redis:7.4-bookworm
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "$$REDIS_PORT", "ping"]
    interval: 5s
    timeout: 3s
    retries: 10
  networks:
    - redis-cluster-net

services:
  redis-cluster-0:
    <<: *redis-node
    container_name: redis-cluster-0
    environment:
      REDIS_PORT: "7000"
    command:
      - redis-server
      - --port
      - "7000"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7000"
      - --cluster-announce-bus-port
      - "17000"
    ports:
      - "7000:7000"
      - "17000:17000"
    volumes:
      - redis-cluster-0:/data

  redis-cluster-1:
    <<: *redis-node
    container_name: redis-cluster-1
    environment:
      REDIS_PORT: "7001"
    command:
      - redis-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7001"
      - --cluster-announce-bus-port
      - "17001"
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - redis-cluster-1:/data

  redis-cluster-2:
    <<: *redis-node
    container_name: redis-cluster-2
    environment:
      REDIS_PORT: "7002"
    command:
      - redis-server
      - --port
      - "7002"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7002"
      - --cluster-announce-bus-port
      - "17002"
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - redis-cluster-2:/data

  redis-cluster-3:
    <<: *redis-node
    container_name: redis-cluster-3
    environment:
      REDIS_PORT: "7003"
    command:
      - redis-server
      - --port
      - "7003"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7003"
      - --cluster-announce-bus-port
      - "17003"
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - redis-cluster-3:/data

  redis-cluster-4:
    <<: *redis-node
    container_name: redis-cluster-4
    environment:
      REDIS_PORT: "7004"
    command:
      - redis-server
      - --port
      - "7004"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7004"
      - --cluster-announce-bus-port
      - "17004"
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - redis-cluster-4:/data

  redis-cluster-5:
    <<: *redis-node
    container_name: redis-cluster-5
    environment:
      REDIS_PORT: "7005"
    command:
      - redis-server
      - --port
      - "7005"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - "127.0.0.1"
      - --cluster-announce-port
      - "7005"
      - --cluster-announce-bus-port
      - "17005"
    ports:
      - "7005:7005"
      - "17005:17005"
    volumes:
      - redis-cluster-5:/data

  cluster-init:
    image: redis:7.4-bookworm
    container_name: redis-cluster-init
    depends_on:
      redis-cluster-0:
        condition: service_healthy
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
      redis-cluster-4:
        condition: service_healthy
      redis-cluster-5:
        condition: service_healthy
    networks:
      - redis-cluster-net
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Bootstrapping Redis Cluster (3 masters + 3 replicas)..."
        redis-cli --cluster create \
          redis-cluster-0:7000 \
          redis-cluster-1:7001 \
          redis-cluster-2:7002 \
          redis-cluster-3:7003 \
          redis-cluster-4:7004 \
          redis-cluster-5:7005 \
          --cluster-replicas 1 \
          --cluster-yes
        echo "Cluster create returned OK. Verifying cluster_state..."
        redis-cli -h redis-cluster-0 -p 7000 cluster info | tee /tmp/info
        grep -q "^cluster_state:ok" /tmp/info
        echo "OK"

volumes:
  redis-cluster-0:
  redis-cluster-1:
  redis-cluster-2:
  redis-cluster-3:
  redis-cluster-4:
  redis-cluster-5:

networks:
  redis-cluster-net:
    driver: bridge
