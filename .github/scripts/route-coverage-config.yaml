# Route Coverage Checker Configuration
# =====================================
# Route files and mount paths are auto-discovered from app.ts and globbed
# route files. Only overrides and edge cases need manual config here.

# Mount path -> spec prefix overrides
# When the Express mount path (after stripping /api/v1) differs from the
# OpenAPI spec path prefix. Format: "/mount-segment": "/spec-segment"
mount_to_spec_overrides:

# Inline middleware routes not using the factory pattern.
# These are mounted directly in app.ts (e.g., raw proxies).
# Format: path: [METHODS]
inline_routes:
  "/slack/events": ["POST"]

# Known discrepancies between code and spec that are acceptable.
# These are pre-existing issues that should be cleaned up over time.
# Format: [METHOD, path]
known_missing:
  - ["PATCH", "/users/{id}/email"]
  # storageConfig in code is a single POST, spec splits into #s3/#azureBlob/#local
  - ["POST", "/configurationManager/storageConfig"]
