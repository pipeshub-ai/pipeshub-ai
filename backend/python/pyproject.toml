[tool.ruff]
line-length = 88
target-version = "py312"
src = ["."]

[tool.ruff.lint]
select = [
    "E",        
    "F",        
    "W",        
    "I",

    # --- Bug detection (catches real runtime errors) ---
    "B006",     # Mutable default argument (def f(x=[]))
    "B007",     # Unused loop variable (use _ prefix)
    "B011",     # assert False (use raise AssertionError)
    "B012",     # return/break/continue in finally block
    "B015",     # Pointless comparison (x == y without using result)
    "B016",     # Raise literal (raise "error" instead of raise Exception)
    "B017",     # assertRaises(Exception) too broad
    "B018",     # Useless expression (statement with no effect)
    "B020",     # Loop variable overwritten inside body
    "B023",     # Function variable not bound in loop body (closure bug)
    "B025",     # try-except-pass with bare except
    "B029",     # except with empty tuple
    "B032",     # Unintentional type annotation (possible := typo)
    "B904",     # raise without from inside except (loses traceback)

    # --- Pylint errors (definite bugs) ---
    "PLE0100",  # __init__ returns a value
    "PLE0101",  # return in __init__
    "PLE0116",  # continue in finally
    "PLE0117",  # non local at module level
    "PLE0241",  # duplicate bases in class
    "PLE0302",  # unexpected special method signature
    "PLE0604",  # invalid __all__ object
    "PLE0605",  # invalid __all__ format
    "PLE1142",  # await outside async

    # --- Pylint warnings (risky patterns) ---
    "PLW0120",  # useless else on loop
    "PLW0127",  # self-assigning variable (x = x)
    "PLW0129",  # assert on string literal (always truthy)
    "PLW0602",  # global without assignment
    "PLW0603",  # global statement usage
    "PLW0711",  # binary op in exception (except A or B)
    "PLW1508",  # invalid envvar default type
    "PLW2901",  # redefined loop variable by assignment

    # --- Pylint refactor (code quality) ---
    "PLR0206",  # property with positional args
    "PLR1704",  # redefining argument with local name
    "PLR1711",  # useless return (return None at end)

    # --- Misc bug catchers ---
    "PIE794",   # duplicate class field definition
    "PIE796",   # non-unique enum values
    "PIE810",   # multiple startswith/endswith (use tuple)

    # --- Return statement issues ---
    "RET504",   # unnecessary assignment before return

    # --- Performance ---
    "PERF101",  # unnecessary list() in for loop
    "PERF102",  # unnecessary list() on dict items/keys/values
    "PERF401",  # use list comprehension instead of for+append
    "PERF403",  # use dict comprehension instead of for+assign

    # --- Comprehension simplification ---
    "C4",       # unnecessary list/dict/set wrappers

    # --- Async issues ---
    "ASYNC100", # no timeout on async blocking calls
    "ASYNC110", # no timeout on async event wait

    # --- Simplification ---
    "SIM102",   # collapsible if statements
    "SIM105",   # use contextlib.suppress instead of try-except-pass
    "SIM108",   # use ternary instead of if-else block
    "SIM110",   # use any() instead of for loop
    "SIM112",   # use os.environ instead of os.environ.get
    "SIM118",   # use `key in dict` instead of `key in dict.keys()`
    "SIM201",   # negate comparison instead of not (x == y)
    "SIM910",   # use dict.get(key) instead of dict.get(key, None)

    # --- Type annotation enforcement (for new code in PRs) ---
    "ANN201",   # missing return type for public function
    "ANN202",   # missing return type for private function
    "ANN204",   # missing return type for __init__
    "ANN205",   # missing return type for staticmethod
    "ANN206",   # missing return type for classmethod

    # --- Ruff-specific ---
    "RUF005",   # collection literal concatenation (use [*a, *b])
    "RUF015",   # unnecessary iterable allocation for first element
    "RUF019",   # unnecessary key check before dict access
    "RUF100",   # unused noqa directive
]
ignore = [
    "E501",     # Line too long (handled by formatter)
    "B008",     # Function call in default arg (conflicts with FastAPI Depends())
]

[tool.ruff.lint.per-file-ignores]
"app/sources/external/**/example*.py" = ["ANN201", "ANN202"]  # Example files don't need annotations
"app/**/migrations/*.py" = ["ANN201", "ANN202"]               # Migration scripts


