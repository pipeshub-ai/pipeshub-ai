[tool.setuptools.packages.find]
exclude = ["modules"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
module = "app.indexing_main:run"

[project.optional-dependencies]
dev = ["ruff", "pyright"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
include = ["app"]
exclude = ["venv", ".venv", "**/__pycache__", "**/node_modules"]

# --- Type inference strictness ---
strictListInference = true                        # [1, "a"] inferred as list[int | str] not list[Unknown]
strictDictionaryInference = true                  # {"a": 1} inferred narrowly
strictSetInference = true                         # {1, "a"} inferred narrowly

# --- Null safety (catch None-related crashes) ---
reportOptionalMemberAccess = "error"              # x.attr where x could be None
reportOptionalCall = "error"                      # x() where x could be None
reportOptionalIterable = "error"                  # for i in x where x could be None
reportOptionalSubscript = "error"                 # x[0] where x could be None
reportOptionalContextManager = "error"            # with x where x could be None
reportOptionalOperand = "error"                   # x + 1 where x could be None

# --- Call-site validation (missing/wrong args) ---
reportCallIssue = "error"                         # Wrong number of args, non-callable objects
reportArgumentType = "error"                      # Wrong argument types passed to functions
reportReturnType = "error"                        # Return type doesn't match annotation
reportAssignmentType = "error"                    # Incompatible assignment types
reportIndexIssue = "error"                        # Invalid subscript/index operations
reportOperatorIssue = "error"                     # Invalid operator usage between types
reportAttributeAccessIssue = "error"              # Accessing unknown attributes

# --- Dead code detection ---
reportUnreachable = "warning"                     # Code after return/raise that never runs
reportUnnecessaryIsInstance = "warning"            # isinstance check always true/false
reportUnnecessaryComparison = "warning"            # Comparison always true/false
reportUnnecessaryContains = "warning"              # `in` check always true/false
reportUnnecessaryCast = "warning"                  # Unnecessary cast() call
reportUnnecessaryTypeIgnoreComment = "warning"     # Stale # type: ignore comments
reportUnusedImport = "warning"                     # Imported but never used
reportUnusedVariable = "warning"                   # Assigned but never read
reportUnusedCallResult = "warning"                 # Return value silently discarded
reportDuplicateImport = "warning"                  # Same module imported twice

# --- Async safety ---
reportUnusedCoroutine = "error"                    # Missing `await` on async calls

# --- Code correctness ---
reportMatchNotExhaustive = "warning"               # match statement missing cases
reportDeprecated = "warning"                       # Using deprecated APIs
reportImportCycles = "warning"                     # Circular imports (cause ImportError)
reportCallInDefaultInitializer = "warning"         # Mutable default: def f(x=list())
reportPropertyTypeMismatch = "warning"             # Getter/setter type mismatch
reportConstantRedefinition = "warning"             # Overwriting ALL_CAPS constants
reportInconsistentConstructor = "warning"          # __init__ vs __new__ signature mismatch
reportUntypedNamedTuple = "warning"                # collections.namedtuple instead of typing.NamedTuple
reportPrivateUsage = "warning"                     # Accessing _private members from outside
reportIncompatibleMethodOverride = "error"         # Method override breaks parent contract
reportIncompatibleVariableOverride = "error"       # Variable override breaks parent type
reportImplicitStringConcatenation = "warning"      # Accidental "foo" "bar" concatenation
