## ---------------------------------------------------------------------------
## User Groups API – Response Schemas
## ---------------------------------------------------------------------------


# Reusable anchor for the user group document fields used by single-document
# endpoints: POST /api/v1/userGroups (create), GET/PUT/DELETE /:groupId.
_user_group_document_fields: &user_group_document_fields
  name:
    type: string
    required: true
  type:
    type: string
    required: true
    enum:
      - admin
      - standard
      - everyone
      - custom
  orgId:
    type: string
    required: true
    format: objectid
  users:
    type: array
    required: true
    items:
      type: string
      format: objectid
  isDeleted:
    type: boolean
    required: true
  deletedBy:
    type: string
    required: false
    format: objectid
  _id:
    type: string
    required: true
    format: objectid
  createdAt:
    required: true
    oneOf:
      - type: string
        format: datetime
      - type: string
        format: date
  updatedAt:
    required: true
    oneOf:
      - type: string
        format: datetime
      - type: string
        format: date
  slug:
    type: string
    required: true
  __v:
    type: integer
    required: true

# Reusable anchor for items inside the paginated getAllUserGroups list.
# Returns userCount instead of the full users array; omits __v and deletedBy.
_user_group_list_item_properties: &user_group_list_item_properties
  _id:
    type: string
    required: true
    format: objectid
  name:
    type: string
    required: true
  type:
    type: string
    required: true
    enum:
      - admin
      - standard
      - everyone
      - custom
  orgId:
    type: string
    required: true
    format: objectid
  slug:
    type: string
    required: true
  isDeleted:
    type: boolean
    required: true
  createdAt:
    required: true
    oneOf:
      - type: string
        format: datetime
      - type: string
        format: date
  updatedAt:
    required: true
    oneOf:
      - type: string
        format: datetime
      - type: string
        format: date
  userCount:
    type: integer
    required: true

# Reusable anchor for pagination metadata returned by paginated endpoints.
_pagination_properties: &pagination_properties
  page:
    type: integer
    required: true
  limit:
    type: integer
    required: true
  totalCount:
    type: integer
    required: true
  totalPages:
    type: integer
    required: true
  hasNextPage:
    type: boolean
    required: true
  hasPrevPage:
    type: boolean
    required: true

schemas:

  - name: UserGroupCreateResponse
    description: "POST /api/v1/userGroups — createUserGroup (201)"
    path: /api/v1/userGroups
    method: POST
    fields:
      <<: *user_group_document_fields

  - name: UserGroupDocumentResponse
    description: "GET/PUT/DELETE /api/v1/userGroups/:groupId — single group document"
    path: /api/v1/userGroups/:groupId
    method: GET
    fields:
      <<: *user_group_document_fields

  - name: UserGroupGetAllResponse
    description: "GET /api/v1/userGroups — paginated object with groups array and pagination metadata"
    path: /api/v1/userGroups
    method: GET
    fields:
      groups:
        type: array
        required: true
        items:
          type: object
          properties:
            <<: *user_group_list_item_properties
      pagination:
        type: object
        required: true
        properties:
          <<: *pagination_properties

  - name: UserGroupGetUsersInGroupResponse
    description: "GET /api/v1/userGroups/:groupId/users — paginated list of user details in a group"
    path: /api/v1/userGroups/:groupId/users
    method: GET
    fields:
      users:
        type: array
        required: true
        items:
          type: object
          properties:
            _id:
              type: string
              required: true
            fullName:
              required: true
              oneOf:
                - type: string
                - type: "null"
            email:
              required: true
              oneOf:
                - type: string
                - type: "null"
            profilePicture:
              required: true
              oneOf:
                - type: string
                - type: "null"
      pagination:
        type: object
        required: true
        properties:
          <<: *pagination_properties

  - name: UserGroupGetGroupsForUserResponse
    description: "GET /api/v1/userGroups/users/:userId — groups a user belongs to"
    path: /api/v1/userGroups/users/:userId
    method: GET
    type: array
    items:
      fields:
        _id:
          type: string
          required: true
          format: objectid
        name:
          type: string
          required: true
        type:
          type: string
          required: true
          enum:
            - admin
            - standard
            - everyone
            - custom

  - name: UserGroupAddUsersResponse
    description: "POST /api/v1/userGroups/add-users — add users to groups"
    path: /api/v1/userGroups/add-users
    method: POST
    fields:
      message:
        type: string
        required: true

  - name: UserGroupRemoveUsersResponse
    description: "POST /api/v1/userGroups/remove-users — remove users from groups"
    path: /api/v1/userGroups/remove-users
    method: POST
    fields:
      message:
        type: string
        required: true

  - name: UserGroupGetStatisticsResponse
    description: "GET /api/v1/userGroups/stats/list — aggregate statistics by group name"
    path: /api/v1/userGroups/stats/list
    method: GET
    type: array
    items:
      fields:
        _id:
          type: string
          required: true
        count:
          type: integer
          required: true
        totalUsers:
          type: integer
          required: true
        avgUsers:
          type: number
          required: true

  - name: UserGroupHealthResponse
    description: "GET /api/v1/userGroups/health — health check"
    path: /api/v1/userGroups/health
    method: GET
    fields:
      status:
        type: string
        required: true
        enum:
          - healthy
      timestamp:
        type: string
        required: true
        format: datetime
